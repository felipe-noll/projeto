<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Formulário de Lançamento</title>
</head>

<body>

    <div class="form-container">
        <h2 th:text="${lancamento.id != null} ? 'Editar Lançamento' : 'Novo Lançamento'"></h2>

        <form th:action="@{/lancamentos/salvar}" method="post" th:object="${lancamento}">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Descrição:</label>
                <input type="text" th:field="*{descricao}" required>
            </div>

            <div class="form-group">
                <label>Valor (R$):</label>
                <input type="number" step="0.01" th:field="*{valor}" required>
            </div>

            <div class="form-group">
                <label>Data:</label>
                <input type="date" th:field="*{dataLancamento}" required>
            </div>

            <div class="form-group">
                <label>Tipo:</label>
                <select th:field="*{tipoLancamento}">
                    <option value="RECEITA">Receita</option>
                    <option value="DESPESA">Despesa</option>
                </select>
            </div>

            <div class="form-group">
                <label>Situação:</label>
                <select th:field="*{situacao}">
                    <option value="PENDENTE">Pendente</option>
                    <option value="PAGO">Pago</option>
                    <option value="RECEBIDO">Recebido</option>
                </select>
            </div>

            <div class="form-group">
                <label>Observação:</label>
                <input type="text" th:field="*{observacao}">
            </div>

            <button type="submit">Salvar</button>
        </form>

        <a href="/lancamentos" class="btn-cancelar">Cancelar</a>
    </div>

</body>

</html>
