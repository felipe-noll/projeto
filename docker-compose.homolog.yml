version: '3.9'

# ============================================================
# AMBIENTE DE HOMOLOGAÇÃO
# aplicação: http://177.44.248.100:8080
# ============================================================

services:

  db-homolog:
    image: postgres:15-alpine
    container_name: db-homolog
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-homolog-data:/var/lib/postgresql/data
    networks:
      - homolog-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-homolog:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app-homolog
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db-homolog
      DB_NAME: app_db
      DB_USER: postgres
      DB_PASS: postgres
      MAIL_HOST: smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USER: username
      MAIL_PASS: password
    depends_on:
      db-homolog:
        condition: service_healthy
    networks:
      - homolog-net

volumes:
  db-homolog-data:

networks:
  homolog-net:
    driver: bridge
