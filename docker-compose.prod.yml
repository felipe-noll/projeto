version: '3.9'

# ============================================================
# AMBIENTE DE PRODUÇÃO
# aplicação: http://177.44.248.100:9080
# ============================================================

services:

  db-prod:
    image: postgres:15-alpine
    container_name: db-prod
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-prod-data:/var/lib/postgresql/data
    networks:
      - prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-prod:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app-prod
    ports:
      - "9080:8080"
    environment:
      DB_HOST: db-prod
      DB_NAME: app_db
      DB_USER: postgres
      DB_PASS: postgres
      MAIL_HOST: smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USER: username
      MAIL_PASS: password
    depends_on:
      db-prod:
        condition: service_healthy
    networks:
      - prod-net

volumes:
  db-prod-data:

networks:
  prod-net:
    driver: bridge
