name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ============================================================
  # B) IMPLEMENTAÇÃO + D) TESTES + E) QUALIDADE DE CÓDIGO
  # ============================================================
  build-and-quality:
    name: Build, Test & Quality
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean compile -DskipTests -pl app -am

      - name: Testes automatizados
        run: mvn test -pl app

      - name: Publicar resultados dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'

      - name: PMD - Mess Detector
        run: mvn pmd:pmd -pl app
        continue-on-error: true

      - name: Publicar anotações PMD
        if: always()
        uses: jwgmeligmeyling/pmd-github-action@v1.2
        with:
          path: 'app/target/pmd-reports/pmd.xml'

      - name: Publicar relatório PMD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: app/target/pmd-reports/


      - name: Package
        run: mvn package -DskipTests -pl app

      - name: Publicar JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: app/target/*.jar

  # ============================================================
  # F) ATUALIZAÇÃO DO AMBIENTE DE HOMOLOGAÇÃO
  # ============================================================
  deploy-homolog:
    name: Deploy Homologação
    runs-on: ubuntu-latest
    needs: build-and-quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMOLOG_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.HOMOLOG_HOST }} >> ~/.ssh/known_hosts || true

      - name: Deploy em Homolog via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              ${{ secrets.HOMOLOG_USER }}@${{ secrets.HOMOLOG_HOST }} \
              "cd ~/projeto && git fetch origin && git reset --hard origin/main && sudo docker compose -f docker-compose.homolog.yml up -d --build"

  # ============================================================
  # G) ATUALIZAÇÃO DO AMBIENTE DE PRODUÇÃO
  # ============================================================
  deploy-prod:
    name: Deploy Produção
    runs-on: ubuntu-latest
    needs: deploy-homolog

    steps:
      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts || true

      - name: Deploy em Prod via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
              "cd ~/projeto && git fetch origin && git reset --hard origin/main && sudo docker compose -f docker-compose.prod.yml up -d --build"giut 